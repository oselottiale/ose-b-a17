<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pico Bluetooth Ohjain</title>
<style>
button {
    width: 150px;
    height: 60px;
    font-size: 20px;
    margin: 10px;
}
</style>
</head>
<body>

<h2>Pico W Bluetooth Ohjain</h2>

<button onclick="yhdista()">Yhdistä</button><br>
<button onclick="laheta('eteen')">Eteen</button>
<button onclick="laheta('taakse')">Taakse</button><br>
<button onclick="laheta('stop')">Stop</button>

<script>
let laite = null;
let palvelu = null;
let karakteri = null;

// UUID:t pienillä kirjaimilla (tärkeää MicroPython 1.27.0)
const SERVICE_UUID = "12345678-1234-5678-1234-56789abcdef0";
const CHAR_UUID    = "12345678-1234-5678-1234-56789abcdef1";

async function yhdista() {
    try {
        console.log("Pyydetään BLE-laitetta...");

        laite = await navigator.bluetooth.requestDevice({
            filters: [{ name: "PicoAuto" }],
            optionalServices: [SERVICE_UUID]
        });

        console.log("Yhdistetään GATT-palvelimeen...");
        const serveri = await laite.gatt.connect();

        console.log("Haetaan palvelu...");
        palvelu = await serveri.getPrimaryService(SERVICE_UUID);

        console.log("Haetaan karakteri...");
        karakteri = await palvelu.getCharacteristic(CHAR_UUID);

        alert("Yhdistetty Picoon!");
        console.log("Yhdistetty!");
    } 
    catch (e) {
        console.error("Virhe yhdistäessä:", e);
        alert("Yhdistäminen epäonnistui");
    }
}

async function laheta(teksti) {
    if (!karakteri) {
        alert("Ei yhteyttä!");
        return;
    }

    try {
        console.log("Lähetetään:", teksti);
        await karakteri.writeValue(new TextEncoder().encode(teksti));
        console.log("Lähetys OK");
    } 
    catch (e) {
        console.error("Lähetysvirhe:", e);
    }
}
</script>

</body>
</html>
