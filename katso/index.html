<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://dev.oseale.com/images/favicon.png" type="image/png">
<title>Fysiikan esitys</title>

<style>
    body {    
        margin: 0;        
        padding: 0;
        overflow-x: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #128a82, #083b38);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .box {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 65vw;
        border: 4px solid #128a82;
    }

    h1 {
        text-align: center;
        color: #333;
        font-size: 42px;
        margin-top: 0;
    }

    .entry {
        margin-bottom: 10px;
    }

    .button {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 4px solid #128a82;
        border-radius: 8px;
        padding: 10px;
        width: calc(100% - 16px);
        text-decoration: none;
        color: #000;
        background: #e8fffd;
        font-size: 18px;
        cursor: pointer;
    }

    .button:hover {
        background: #d4f7f4;
    }

    .title-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .arrow-icon {
        font-size: 16px;
        opacity: 0.7;
    }

    .copy-icon {
        background: #128a82;
        color: white;
        padding: 4px 6px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        margin-left: 10px;
        user-select: none;
    }

    .copy-icon:hover {
        background: #0e6b66;
    }

    #links {
        opacity: 0;
        transition: opacity 0.3s ease;
    }
</style>
</head>
<body>
<div class="box">
    <h1 id="pagetitle">Fysiikan esitys</h1>
    <iframe src="https://dev.oseale.com/katso/esitys.html" style="aspect-ratio: 16 / 9; width:100%;"></iframe>
</div>
</body>
</html>
